<!DOCTYPE html>
<html lang="pt-BR">

<style>
  :root{
    --bg-0:#0F0D12;
    --bg-1:#171319;
    --bg-2:#1F1922;
    --bg-card:#211B26;
    --line:rgba(245,240,232,0.09);
    --line-strong:rgba(245,240,232,0.16);
    --gold:#E8C4A0;
    --gold-deep:#C99A6C;
    --lilac:#C77DFF;
    --lilac-deep:#9D4EDD;
    --text-0:#F5F0E8;
    --text-1:#C9C2D1;
    --text-2:#8B8594;
    --success:#7FD9A8;
    --danger:#E8849A;
    --radius-sm:10px;
    --radius-md:16px;
    --radius-lg:24px;
    --serif:'Fraunces', serif;
    --sans:'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg-0); color:var(--text-0); font-family:var(--sans); -webkit-font-smoothing:antialiased;}
  body{overflow-x:hidden;}
  #root{min-height:100vh;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:var(--lilac-deep); color:white;}
  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-track{background:var(--bg-0);}
  ::-webkit-scrollbar-thumb{background:var(--bg-2); border-radius:8px;}
  .serif{font-family:var(--serif);}
  .container{max-width:1180px; margin:0 auto; padding:0 28px;}
  @media (max-width:720px){ .container{padding:0 18px;} }

  /* glow signature element */
  .glow-ring{
    position:absolute; border-radius:50%;
    filter: blur(60px);
    opacity:0.55;
    pointer-events:none;
  }
  @keyframes drift{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(20px,-16px) scale(1.06); }
  }
  @keyframes pulse-soft{
    0%,100%{ opacity:0.4; }
    50%{ opacity:0.7; }
  }
  .reveal{
    opacity:0; transform: translateY(14px);
    animation: revealUp 0.7s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes revealUp{ to{ opacity:1; transform:translateY(0); } }

  @media (prefers-reduced-motion: reduce){
    .glow-ring{ animation:none !important; }
    .reveal{ animation:none !important; opacity:1; transform:none; }
  }

  input[type=text], input[type=email], input[type=password], input[type=tel], input[type=number], input[type=date], input[type=time], select, textarea{
    width:100%;
    background: var(--bg-1);
    border:1px solid var(--line-strong);
    color:var(--text-0);
    border-radius: var(--radius-sm);
    padding:11px 14px;
    font-size:14.5px;
    outline:none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  input::placeholder, textarea::placeholder{ color:var(--text-2); }
  input:focus, select:focus, textarea:focus{
    border-color: var(--lilac-deep);
    box-shadow: 0 0 0 3px rgba(157,78,221,0.18);
  }
  label{ font-size:13px; color:var(--text-1); display:block; margin-bottom:6px; font-weight:500; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:none; border-radius: var(--radius-sm);
    font-weight:600; font-size:14.5px;
    padding:12px 22px;
    transition: transform .15s ease, opacity .15s ease, box-shadow .15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{
    background: linear-gradient(135deg, var(--lilac) 0%, var(--lilac-deep) 100%);
    color:#fff;
    box-shadow: 0 8px 24px -8px rgba(157,78,221,0.55);
  }
  .btn-primary:hover{ box-shadow: 0 10px 28px -6px rgba(157,78,221,0.7); }
  .btn-gold{
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-deep) 100%);
    color:#241A12;
    box-shadow: 0 8px 24px -8px rgba(232,196,160,0.45);
  }
  .btn-ghost{
    background: transparent; color:var(--text-0);
    border:1px solid var(--line-strong);
  }
  .btn-ghost:hover{ background: var(--bg-2); }
  .btn-block{ width:100%; }
  .btn-sm{ padding:8px 14px; font-size:13px; }

  .card{
    background: var(--bg-card);
    border:1px solid var(--line);
    border-radius: var(--radius-md);
    padding:24px;
  }

  .badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12px; font-weight:600;
    padding:5px 11px; border-radius:100px;
  }
  .badge-gold{ background: rgba(232,196,160,0.14); color:var(--gold); border:1px solid rgba(232,196,160,0.3); }
  .badge-lilac{ background: rgba(199,125,255,0.14); color:var(--lilac); border:1px solid rgba(199,125,255,0.3); }
  .badge-success{ background: rgba(127,217,168,0.14); color:var(--success); border:1px solid rgba(127,217,168,0.3); }
  .badge-danger{ background: rgba(232,132,154,0.14); color:var(--danger); border:1px solid rgba(232,132,154,0.3); }
  .badge-gray{ background: var(--bg-2); color:var(--text-2); border:1px solid var(--line); }

  table{ width:100%; border-collapse:collapse; }
  th{ text-align:left; font-size:12px; color:var(--text-2); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; padding:10px 12px; border-bottom:1px solid var(--line); }
  td{ padding:13px 12px; font-size:14px; border-bottom:1px solid var(--line); }
  tr:last-child td{ border-bottom:none; }

  .icon{ width:18px; height:18px; display:inline-block; vertical-align:middle; }

  .toast{
    position:fixed; bottom:24px; right:24px; z-index:999;
    background: var(--bg-card); border:1px solid var(--line-strong);
    border-radius: var(--radius-sm); padding:14px 18px;
    display:flex; align-items:center; gap:10px;
    box-shadow: 0 12px 32px -8px rgba(0,0,0,0.5);
    animation: toastIn .3s cubic-bezier(.16,1,.3,1);
    font-size:14px;
  }
  @keyframes toastIn{ from{ opacity:0; transform: translateY(12px);} to{ opacity:1; transform:none; } }

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(8,6,10,0.7);
    display:flex; align-items:center; justify-content:center;
    z-index:998; padding:20px; backdrop-filter: blur(4px);
  }
  .modal{
    background: var(--bg-card); border:1px solid var(--line-strong);
    border-radius: var(--radius-md); padding:28px;
    max-width:480px; width:100%; max-height:88vh; overflow-y:auto;
    animation: modalIn .25s cubic-bezier(.16,1,.3,1);
  }
  @keyframes modalIn{ from{ opacity:0; transform: scale(0.96) translateY(8px); } to{ opacity:1; transform:none; } }

  .sidebar-link{
    display:flex; align-items:center; gap:11px;
    padding:10px 14px; border-radius:var(--radius-sm);
    font-size:14px; font-weight:500; color:var(--text-1);
    transition: background .15s ease, color .15s ease;
  }
  .sidebar-link:hover{ background: var(--bg-2); color:var(--text-0); }
  .sidebar-link.active{ background: rgba(199,125,255,0.12); color:var(--lilac); }

  .tab{
    padding:9px 18px; border-radius:100px; font-size:13.5px; font-weight:600;
    color:var(--text-2); cursor:pointer; transition: all .15s ease;
    border:1px solid transparent;
  }
  .tab.active{ background: var(--bg-2); color:var(--text-0); border-color:var(--line-strong); }

  .skel{ background: linear-gradient(90deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-1) 100%); background-size:200% 100%; animation: skel 1.4s ease infinite; border-radius:8px; }
  @keyframes skel{ to{ background-position: -200% 0; } }
</style>

/* ============================================================
   FORMATTERS
   ============================================================ */
const fmtBRL = (n) => n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
const fmtDate = (iso) => {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" });
};
const fmtDateLong = (iso) => {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("pt-BR", { weekday: "short", day: "2-digit", month: "short" });
};
const todayISO = () => new Date().toISOString().slice(0, 10);
const addDays = (iso, n) => {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
};
const uid = (p = "id") => `${p}_${Math.random().toString(36).slice(2, 9)}`;
const slugify = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
const initials = (name) => name.split(" ").filter(Boolean).slice(0, 2).map(w => w[0]).join("").toUpperCase();

/* ============================================================
   STORAGE — usa localStorage para funcionar em qualquer navegador
   ============================================================ */
const Store = {
  async get(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) { return fallback; }
  },
  async set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  },
};

/* ============================================================
   GLOBAL APP CONTEXT
   ============================================================ */
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

function useToast() {
  const { setToast } = useApp();
  return (msg, type = "success") => {
    setToast({ msg, type, key: uid("t") });
  };
}

/* ============================================================
   SHARED UI BITS
   ============================================================ */
function Toast({ toast }) {
  if (!toast) return null;
  const color = toast.type === "error" ? "var(--danger)" : toast.type === "info" ? "var(--lilac)" : "var(--success)";
  const icon = toast.type === "error" ? "x" : toast.type === "info" ? "info" : "check";
  return (
    <div className="toast" key={toast.key}>
      <span style={{ color }}><Icon name={icon} size={18} /></span>
      <span>{toast.msg}</span>
    </div>
  );
}

function Modal({ onClose, children, width }) {
  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [onClose]);
  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={width ? { maxWidth: width } : {}}>
        {children}
      </div>
    </div>
  );
}

  );
}

function SignupScreen({ initialPlan, onBack, onComplete }) {
  const [step, setStep] = useState(1);
  const [studioName, setStudioName] = useState("");
  const [ownerName, setOwnerName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [plan, setPlan] = useState(initialPlan || "mensal");
  const [payMethod, setPayMethod] = useState("pix");
  const [loading, setLoading] = useState(false);
  const [showPw, setShowPw] = useState(false);

  const canStep1 = studioName.trim().length >= 2 && ownerName.trim().length >= 2 && email.includes("@") && password.length >= 6;

  const handleFinish = () => {
    setLoading(true);
    setTimeout(() => {
      onComplete({ studioName, ownerName, email, password, plan, payMethod });
    }, 900);
  };

  return (
    <AuthShell onBack={onBack}>
      <div className="card" style={{ padding: 32 }}>
        <div style={{ display: "flex", gap: 6, marginBottom: 24 }}>
          {[1, 2].map(s => (
            <div key={s} style={{ flex: 1, height: 4, borderRadius: 4, background: step >= s ? "var(--lilac)" : "var(--bg-2)" }} />
          ))}
        </div>

        {step === 1 && (
          <>
            <h2 className="serif" style={{ fontSize: 24, fontWeight: 500, marginBottom: 6 }}>Crie sua agenda</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", marginBottom: 24 }}>Use o nome que seus clientes vão ver — pode ser o nome do seu studio ou o seu nome.</p>
            <Field label="Nome do studio (ou seu nome)">
              <input type="text" placeholder="Ex: Studio Camila Estética" value={studioName} onChange={e => setStudioName(e.target.value)} />
            </Field>
            <Field label="Seu nome completo">
              <input type="text" placeholder="Seu nome" value={ownerName} onChange={e => setOwnerName(e.target.value)} />
            </Field>
            <Field label="E-mail">
              <input type="email" placeholder="voce@email.com" value={email} onChange={e => setEmail(e.target.value)} />
            </Field>
            <Field label="Senha">
              <div style={{ position: "relative" }}>
                <input type={showPw ? "text" : "password"} placeholder="Mínimo 6 caracteres" value={password} onChange={e => setPassword(e.target.value)} style={{ paddingRight: 42 }} />
                <button onClick={() => setShowPw(!showPw)} style={{ position: "absolute", right: 10, top: 9, background: "none", border: "none", color: "var(--text-2)" }} tabIndex={-1} aria-label={showPw ? "Ocultar senha" : "Mostrar senha"}>
                  <Icon name={showPw ? "eyeOff" : "eye"} size={17} />
                </button>
              </div>
            </Field>
            <button className="btn btn-primary btn-block" disabled={!canStep1} style={{ opacity: canStep1 ? 1 : 0.5, marginTop: 8 }} onClick={() => setStep(2)}>
              Continuar <Icon name="arrowRight" size={15} />
            </button>
          </>
        )}

        {step === 2 && (
          <>
            <h2 className="serif" style={{ fontSize: 24, fontWeight: 500, marginBottom: 6 }}>Escolha seu plano</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", marginBottom: 20 }}>Sem fidelidade no mensal. Cancele quando quiser.</p>
            <PlanPicker value={plan} onChange={setPlan} />
            <label style={{ marginTop: 4 }}>Forma de pagamento</label>
            <PaymentPicker value={payMethod} onChange={setPayMethod} />
            <div className="card" style={{ background: "var(--bg-1)", padding: 16, margin: "18px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <p style={{ fontSize: 13, color: "var(--text-2)" }}>Total {plan === "anual" ? "por ano" : "por mês"}</p>
                <p className="serif" style={{ fontSize: 22, fontWeight: 500 }}>{fmtBRL(plan === "anual" ? PLAN_PRICES.anual : PLAN_PRICES.mensal)}</p>
              </div>
              <span className="badge badge-success"><Icon name="shield" size={12} /> Pagamento seguro</span>
            </div>
            <button className="btn btn-primary btn-block" onClick={handleFinish} disabled={loading} style={{ opacity: loading ? 0.7 : 1 }}>
              {loading ? "Confirmando assinatura..." : `Assinar e criar minha agenda`}
            </button>
            <button className="btn btn-ghost btn-block" style={{ marginTop: 10 }} onClick={() => setStep(1)}>Voltar</button>
          </>
        )}
      </div>
    </AuthShell>
  );
}

function LoginScreen({ onBack, onLogin, onForgot, role }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState("");

  const submit = () => {
    const ok = onLogin(email.trim(), password);
    if (!ok) setError("E-mail ou senha incorretos.");
  };

  return (
    <AuthShell onBack={onBack}>
      <div className="card" style={{ padding: 32 }}>
        <h2 className="serif" style={{ fontSize: 24, fontWeight: 500, marginBottom: 6 }}>
          {role === "admin" ? "Acesso administrativo" : "Entrar na sua agenda"}
        </h2>
        <p style={{ fontSize: 14, color: "var(--text-2)", marginBottom: 24 }}>
          {role === "admin" ? "Painel restrito ao administrador do Agenda Glow." : "Acesse o painel do seu studio."}
        </p>
        {error && <div className="badge badge-danger" style={{ marginBottom: 16, display: "flex" }}>{error}</div>}
        <Field label="E-mail">
          <input type="email" placeholder="voce@email.com" value={email} onChange={e => { setEmail(e.target.value); setError(""); }} />
        </Field>
        <Field label="Senha">
          <div style={{ position: "relative" }}>
            <input type={showPw ? "text" : "password"} placeholder="Sua senha" value={password} onChange={e => { setPassword(e.target.value); setError(""); }} style={{ paddingRight: 42 }} onKeyDown={e => e.key === "Enter" && submit()} />
            <button onClick={() => setShowPw(!showPw)} style={{ position: "absolute", right: 10, top: 9, background: "none", border: "none", color: "var(--text-2)" }} tabIndex={-1} aria-label={showPw ? "Ocultar senha" : "Mostrar senha"}>
              <Icon name={showPw ? "eyeOff" : "eye"} size={17} />
            </button>
          </div>
        </Field>
        <button className="btn btn-primary btn-block" onClick={submit} style={{ marginTop: 8 }}>Entrar</button>

          </p>
        )}
        {role === "admin" && (
          <p style={{ fontSize: 13, color: "var(--text-2)", textAlign: "center", marginTop: 16 }}>
            Use <b style={{ color: "var(--text-1)" }}>admin@agendaglow.com</b> / <b style={{ color: "var(--text-1)" }}>admin123</b>
          </p>
        )}
      </div>
    </AuthShell>
  );
}

function AppointmentModal({ studio, onClose, onSave, editing }) {

        {editing ? "Salvar alterações" : "Criar agendamento"}
      </button>

function AgendaTab({ studio, updateStudio, onMenu }) {
  const toast = useToast();
  const [selectedDate, setSelectedDate] = useState(todayISO());
  const [modalOpen, setModalOpen] = useState(false);
  const [editing, setEditing] = useState(null);

  const days = Array.from({ length: 7 }, (_, i) => addDays(todayISO(), i));
  const dayAppts = studio.appointments.filter(a => a.date === selectedDate).sort((a, b) => a.time.localeCompare(b.time));

  const getClient = (id) => studio.clients.find(c => c.id === id);
  const getService = (id) => studio.services.find(s => s.id === id);

  const saveAppt = (data) => {
    let appts;
    if (editing) {
      appts = studio.appointments.map(a => a.id === editing.id ? { ...a, ...data } : a);
      toast("Agendamento atualizado");
    } else {
      appts = [...studio.appointments, { id: uid("apt"), ...data }];
      toast(data.notify ? "Agendamento criado e cliente notificado no WhatsApp" : "Agendamento criado");
    }
    updateStudio({ ...studio, appointments: appts });
    setModalOpen(false);
    setEditing(null);
  };

  const removeAppt = (id) => {
    updateStudio({ ...studio, appointments: studio.appointments.filter(a => a.id !== id) });
    toast("Agendamento removido", "info");
  };

  return (
    <div>
      <TopBar title="Agenda" onMenu={onMenu} right={
        <button className="btn btn-primary btn-sm" onClick={() => { setEditing(null); setModalOpen(true); }}>
          <Icon name="plus" size={15} /> Novo agendamento
        </button>
      } />

      <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4, marginBottom: 22 }}>
        {days.map(d => (
          <button key={d} onClick={() => setSelectedDate(d)} style={{
            flexShrink: 0, minWidth: 72, padding: "10px 6px", borderRadius: 12, textAlign: "center",
            border: selectedDate === d ? "2px solid var(--lilac)" : "1px solid var(--line-strong)",
            background: selectedDate === d ? "rgba(199,125,255,0.08)" : "var(--bg-1)",
          }}>
            <p style={{ fontSize: 11, color: "var(--text-2)", textTransform: "uppercase" }}>{fmtDateLong(d).split(" ")[0].replace(".", "")}</p>
            <p style={{ fontSize: 17, fontWeight: 600, marginTop: 2 }}>{d.slice(8, 10)}</p>
            {d === todayISO() && <span style={{ fontSize: 9.5, color: "var(--lilac)" }}>hoje</span>}
          </button>
        ))}
      </div>

      {dayAppts.length === 0 ? (
        <EmptyState icon="calendar" title="Nenhum horário neste dia" body="Crie um novo agendamento ou compartilhe seu link para que clientes marquem direto." action={
          <button className="btn btn-primary" onClick={() => setModalOpen(true)}><Icon name="plus" size={15} /> Novo agendamento</button>
        } />
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {dayAppts.map(a => {
            const client = getClient(a.clientId), service = getService(a.serviceId);
            return (
              <div key={a.id} className="card" style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
                <div style={{ textAlign: "center", minWidth: 54 }}>
                  <p className="serif" style={{ fontSize: 18, fontWeight: 500 }}>{a.time}</p>
                </div>
                <Avatar name={client?.name || "?"} size={40} />
                <div style={{ flex: 1, minWidth: 140 }}>
                  <p style={{ fontWeight: 600, fontSize: 14.5 }}>{client?.name}</p>
                  <p style={{ fontSize: 13, color: "var(--text-2)" }}>{service?.name} · {fmtBRL(service?.price || 0)}</p>
                </div>
                <StatusBadge status={a.status} />
                <div style={{ display: "flex", gap: 6 }}>
                  <button className="btn btn-ghost btn-sm" style={{ padding: 8 }} onClick={() => { setEditing(a); setModalOpen(true); }} aria-label="Editar"><Icon name="edit" size={15} /></button>
                  <button className="btn btn-ghost btn-sm" style={{ padding: 8, color: "var(--danger)" }} onClick={() => removeAppt(a.id)} aria-label="Excluir"><Icon name="trash" size={15} /></button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {modalOpen && <AppointmentModal studio={studio} editing={editing} onClose={() => { setModalOpen(false); setEditing(null); }} onSave={saveAppt} />}
    </div>
  );
}

function ClientsTab({ studio, updateStudio, onMenu }) {
  const toast = useToast();
  const [modalOpen, setModalOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [search, setSearch] = useState("");

  const filtered = studio.clients.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));

  const save = (data) => {
    let clients;
    if (editing) { clients = studio.clients.map(c => c.id === editing.id ? { ...c, ...data } : c); toast("Cliente atualizado"); }
    else { clients = [...studio.clients, { id: uid("cli"), ...data }]; toast("Cliente cadastrado"); }
    updateStudio({ ...studio, clients });
    setModalOpen(false); setEditing(null);
  };

  const remove = (id) => {
    updateStudio({ ...studio, clients: studio.clients.filter(c => c.id !== id) });
    toast("Cliente removido", "info");
  };

  const visitsCount = (clientId) => studio.appointments.filter(a => a.clientId === clientId && a.status === "concluido").length;

  return (
    <div>
      <TopBar title="Clientes" onMenu={onMenu} right={
        <button className="btn btn-primary btn-sm" onClick={() => { setEditing(null); setModalOpen(true); }}><Icon name="plus" size={15} /> Novo cliente</button>
      } />
      <div style={{ marginBottom: 18, maxWidth: 320 }}>
        <input type="text" placeholder="Buscar cliente..." value={search} onChange={e => setSearch(e.target.value)} />
      </div>
      {filtered.length === 0 ? (
        <EmptyState icon="users" title="Nenhum cliente encontrado" body="Cadastre clientes para agendar horários e enviar notificações no WhatsApp." action={
          <button className="btn btn-primary" onClick={() => setModalOpen(true)}><Icon name="plus" size={15} /> Novo cliente</button>
        } />
      ) : (
        <div className="card" style={{ padding: 0, overflow: "hidden" }}>
          <table>
            <thead><tr><th>Cliente</th><th>WhatsApp</th><th>Visitas concluídas</th><th></th></tr></thead>
            <tbody>
              {filtered.map(c => (
                <tr key={c.id}>
                  <td><div style={{ display: "flex", alignItems: "center", gap: 10 }}><Avatar name={c.name} size={32} /> {c.name}</div></td>
                  <td style={{ color: "var(--text-1)" }}><Icon name="whatsapp" size={13} style={{ marginRight: 6, color: "var(--success)" }} />{c.phone}</td>
                  <td>{visitsCount(c.id)}</td>
                  <td>
                    <div style={{ display: "flex", gap: 6, justifyContent: "flex-end" }}>
                      <button className="btn btn-ghost btn-sm" style={{ padding: 7 }} onClick={() => { setEditing(c); setModalOpen(true); }} aria-label="Editar"><Icon name="edit" size={14} /></button>
                      <button className="btn btn-ghost btn-sm" style={{ padding: 7, color: "var(--danger)" }} onClick={() => remove(c.id)} aria-label="Excluir"><Icon name="trash" size={14} /></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      {modalOpen && <ClientModal editing={editing} onClose={() => { setModalOpen(false); setEditing(null); }} onSave={save} />}
    </div>
  );
}

  const toast = useToast();
  const [modalOpen, setModalOpen] = useState(false);
  const [editing, setEditing] = useState(null);

  const save = (data) => {
    let services;
    if (editing) { services = studio.services.map(s => s.id === editing.id ? { ...s, ...data } : s); toast("Serviço atualizado"); }
    else { services = [...studio.services, { id: uid("srv"), ...data }]; toast("Serviço cadastrado"); }
    updateStudio({ ...studio, services });
    setModalOpen(false); setEditing(null);
  };
  const remove = (id) => { updateStudio({ ...studio, services: studio.services.filter(s => s.id !== id) }); toast("Serviço removido", "info"); };

  return (
    <div>
      <TopBar title="Serviços" onMenu={onMenu} right={
        <button className="btn btn-primary btn-sm" onClick={() => { setEditing(null); setModalOpen(true); }}><Icon name="plus" size={15} /> Novo serviço</button>
      } />
      {studio.services.length === 0 ? (
        <EmptyState icon="scissors" title="Nenhum serviço cadastrado" body="Cadastre os serviços que seu studio oferece para começar a receber agendamentos." action={
          <button className="btn btn-primary" onClick={() => setModalOpen(true)}><Icon name="plus" size={15} /> Novo serviço</button>
        } />
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 14 }}>
          {studio.services.map(s => (
            <div key={s.id} className="card">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ width: 38, height: 38, borderRadius: 10, background: "rgba(232,196,160,0.14)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--gold)" }}>
                  <Icon name="scissors" size={17} />
                </div>
                <div style={{ display: "flex", gap: 4 }}>
                  <button className="btn btn-ghost btn-sm" style={{ padding: 6 }} onClick={() => { setEditing(s); setModalOpen(true); }} aria-label="Editar"><Icon name="edit" size={13} /></button>
                  <button className="btn btn-ghost btn-sm" style={{ padding: 6, color: "var(--danger)" }} onClick={() => remove(s.id)} aria-label="Excluir"><Icon name="trash" size={13} /></button>
                </div>
              </div>
              <p style={{ fontWeight: 600, fontSize: 15.5, marginTop: 14 }}>{s.name}</p>
              <div style={{ display: "flex", gap: 14, marginTop: 8, fontSize: 13, color: "var(--text-2)" }}>
                <span><Icon name="clock" size={13} style={{ marginRight: 4 }} />{s.duration} min</span>
                <span style={{ color: "var(--gold)", fontWeight: 600 }}>{fmtBRL(s.price)}</span>
              </div>
            </div>
          ))}
        </div>
      )}
      {modalOpen && <ServiceModal editing={editing} onClose={() => { setModalOpen(false); setEditing(null); }} onSave={save} />}
    </div>
  );
}

function platformStats(studios) {
  const active = studios.filter(s => s.planStatus === "ativo");
  const mrr = active.reduce((sum, s) => sum + (s.plan === "anual" ? PLAN_PRICES.anual / 12 : PLAN_PRICES.mensal), 0);
  const annualCount = active.filter(s => s.plan === "anual").length;
  const monthlyCount = active.filter(s => s.plan === "mensal").length;
  const totalRevenue = studios.reduce((sum, s) => sum + s.payments.filter(p => p.status === "pago").reduce((a, p) => a + p.amount, 0), 0);
  return { active: active.length, mrr, annualCount, monthlyCount, totalRevenue, total: studios.length };
}

        {PAYMENT_METHODS.map(m => (
          <div key={m.id} style={{ marginBottom: 12 }}>
            <ToggleSwitch checked={true} onChange={() => toast(`${m.label} é uma forma de pagamento essencial e não pode ser desativada`, "info")} label={m.label} sub={m.desc} />
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminPaymentsTab({ studios, onMenu }) {
  const allPayments = studios.flatMap(s => s.payments.map(p => ({ ...p, studioName: s.name })));
  const totalReceived = allPayments.filter(p => p.status === "pago").reduce((s, p) => s + p.amount, 0);
  return (
    <div>
      <TopBar title="Pagamentos recebidos" onMenu={onMenu} />
      <div style={{ display: "flex", gap: 14, marginBottom: 24, flexWrap: "wrap" }}>
        <StatCard icon="money" label="Total recebido na plataforma" value={fmtBRL(totalReceived)} tone="success" />
        <StatCard icon="chart" label="Pagamentos registrados" value={allPayments.length} tone="lilac" />
      </div>
      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        <table>
          <thead><tr><th>Studio</th><th>Descrição</th><th>Data</th><th>Forma</th><th>Status</th><th style={{ textAlign: "right" }}>Valor</th></tr></thead>
          <tbody>
            {allPayments.slice().sort((a, b) => b.date.localeCompare(a.date)).map(p => (
              <tr key={p.id}>
                <td>{p.studioName}</td>
                <td style={{ color: "var(--text-2)" }}>{p.label}</td>
                <td style={{ color: "var(--text-2)" }}>{fmtDate(p.date)}</td>
                <td>{PAYMENT_METHODS.find(m => m.id === p.method)?.label || p.method}</td>
                <td><StatusBadge status={p.status} /></td>
                <td style={{ textAlign: "right", fontWeight: 600 }}>{fmtBRL(p.amount)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function AdminApp({ studios, setStudios, onLogout }) {
  const [active, setActive] = useState("visao");
  const [mobileOpen, setMobileOpen] = useState(false);
  const menuProps = { onMenu: () => setMobileOpen(true) };

  const tabs = {
    visao: <AdminOverview studios={studios} {...menuProps} />,
    studios: <AdminStudiosTab studios={studios} setStudios={setStudios} {...menuProps} />,
    planos: <AdminPlansTab {...menuProps} />,
    pagamentos: <AdminPaymentsTab studios={studios} {...menuProps} />,
  };

  return (
    <div style={{ display: "flex" }}>
      <AdminSidebar active={active} setActive={setActive} onLogout={onLogout} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} />
      <div className="main-content" style={{ flex: 1, marginLeft: 250, padding: "28px 32px", minHeight: "100vh" }}>
        {tabs[active]}
      </div>
    </div>
  );
}

/* ============================================================
   PUBLIC BOOKING PAGE — what the studio's end clients see
   ============================================================ */
function PublicBookingPage({ studio, onBookingComplete }) {
  const [serviceId, setServiceId] = useState(studio.services[0]?.id || "");
  const [date, setDate] = useState(todayISO());
  const [time, setTime] = useState("");
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [done, setDone] = useState(false);

  const days = Array.from({ length: 7 }, (_, i) => addDays(todayISO(), i));
  const takenTimes = studio.appointments.filter(a => a.date === date).map(a => a.time);
  const slots = ["09:00", "10:00", "11:00", "13:00", "14:00", "15:00", "16:00", "17:00"];
  const service = studio.services.find(s => s.id === serviceId);

  const canBook = serviceId && date && time && name.trim().length >= 2 && phone.trim().length >= 8;

  const confirm = () => {
    onBookingComplete({ serviceId, date, time, name, phone });
    setDone(true);
  };

  if (done) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div className="card" style={{ maxWidth: 420, textAlign: "center", padding: 36 }}>
          <div style={{ width: 56, height: 56, borderRadius: "50%", background: "rgba(127,217,168,0.14)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 18px", color: "var(--success)" }}>
            <Icon name="check" size={26} />
          </div>
          <h2 className="serif" style={{ fontSize: 22, marginBottom: 10 }}>Agendamento confirmado!</h2>
          <p style={{ color: "var(--text-1)", marginBottom: 18, fontSize: 14.5 }}>
            {service?.name} no dia {fmtDate(date)} às {time}. Você vai receber a confirmação e um lembrete no seu WhatsApp.
          </p>
          <div className="badge badge-success"><Icon name="whatsapp" size={13} /> Notificação enviada para {phone}</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", padding: "0 0 60px" }}>
      <div style={{ borderBottom: "1px solid var(--line)", padding: "22px 0" }}>
        <div className="container" style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <Avatar name={studio.name} size={42} tone="gold" />
          <div>
            <p className="serif" style={{ fontSize: 19, fontWeight: 500 }}>{studio.name}</p>
            <p style={{ fontSize: 12.5, color: "var(--text-2)" }}>Agende seu horário online</p>
          </div>
        </div>
      </div>

      <div className="container" style={{ maxWidth: 560, paddingTop: 32 }}>
        <p style={{ fontSize: 13, fontWeight: 600, color: "var(--text-2)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 12 }}>1. Escolha o serviço</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 28 }}>
          {studio.services.map(s => (
            <button key={s.id} onClick={() => setServiceId(s.id)} style={{
              display: "flex", justifyContent: "space-between", alignItems: "center", padding: "13px 16px", borderRadius: 12, textAlign: "left",
              border: serviceId === s.id ? "2px solid var(--lilac)" : "1px solid var(--line-strong)",
              background: serviceId === s.id ? "rgba(199,125,255,0.06)" : "var(--bg-1)",
            }}>
              <div>
                <p style={{ fontWeight: 500, fontSize: 14.5 }}>{s.name}</p>
                <p style={{ fontSize: 12.5, color: "var(--text-2)" }}>{s.duration} min</p>
              </div>
              <span style={{ fontWeight: 600, color: "var(--gold)" }}>{fmtBRL(s.price)}</span>
            </button>
          ))}
        </div>

        <p style={{ fontSize: 13, fontWeight: 600, color: "var(--text-2)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 12 }}>2. Escolha o dia</p>
        <div style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 24, paddingBottom: 4 }}>
          {days.map(d => (
            <button key={d} onClick={() => { setDate(d); setTime(""); }} style={{
              flexShrink: 0, minWidth: 64, padding: "9px 4px", borderRadius: 10, textAlign: "center",
              border: date === d ? "2px solid var(--lilac)" : "1px solid var(--line-strong)",
              background: date === d ? "rgba(199,125,255,0.08)" : "var(--bg-1)",
            }}>
              <p style={{ fontSize: 10.5, color: "var(--text-2)", textTransform: "uppercase" }}>{fmtDateLong(d).split(" ")[0].replace(".", "")}</p>
              <p style={{ fontSize: 16, fontWeight: 600 }}>{d.slice(8, 10)}</p>
            </button>
          ))}
        </div>

        <p style={{ fontSize: 13, fontWeight: 600, color: "var(--text-2)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 12 }}>3. Escolha o horário</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 28 }}>
          {slots.map(t => {
            const taken = takenTimes.includes(t);
            return (
              <button key={t} disabled={taken} onClick={() => setTime(t)} style={{
                padding: "10px 4px", borderRadius: 10, fontSize: 13.5, fontWeight: 500,
                border: time === t ? "2px solid var(--lilac)" : "1px solid var(--line-strong)",
                background: taken ? "var(--bg-1)" : time === t ? "rgba(199,125,255,0.08)" : "var(--bg-card)",
                color: taken ? "var(--text-2)" : "var(--text-0)",
                opacity: taken ? 0.45 : 1, textDecoration: taken ? "line-through" : "none",
              }}>{t}</button>
            );
          })}
        </div>

        <p style={{ fontSize: 13, fontWeight: 600, color: "var(--text-2)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 12 }}>4. Seus dados</p>
        <Field label="Nome completo"><input type="text" placeholder="Seu nome" value={name} onChange={e => setName(e.target.value)} /></Field>
        <Field label="WhatsApp"><input type="tel" placeholder="11 99999-0000" value={phone} onChange={e => setPhone(e.target.value)} /></Field>

        <div className="card" style={{ background: "var(--bg-1)", marginBottom: 20, fontSize: 13, color: "var(--text-1)", display: "flex", gap: 8 }}>
          <Icon name="whatsapp" size={16} style={{ color: "var(--success)", flexShrink: 0 }} />
          Você vai receber a confirmação e um lembrete deste horário no seu WhatsApp.
        </div>

        <button className="btn btn-primary btn-block" disabled={!canBook} style={{ opacity: canBook ? 1 : 0.5 }} onClick={confirm}>
          Confirmar agendamento
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP — routing between landing, auth, studio app, admin app
   ============================================================ */
const STORAGE_KEY = "agendaglow:db:v1";

function LoadingScreen() {
  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ width: 36, height: 36, borderRadius: "50%", border: "3px solid var(--bg-2)", borderTopColor: "var(--lilac)", animation: "spin 0.8s linear infinite" }} />
      <style>{`@keyframes spin{ to{ transform:rotate(360deg); } }`}</style>
    </div>
  );
}

function Root() {
  const [booted, setBooted] = useState(false);
  const [studios, setStudios] = useState([]);
  const [view, setView] = useState("landing"); // landing | signup | login | adminLogin | studio | admin | public
  const [signupPlan, setSignupPlan] = useState("mensal");
  const [session, setSession] = useState(null); // { type: 'studio'|'admin', studioId }
  const [publicSlug, setPublicSlug] = useState(null);
  const [toast, setToast] = useState(null);

  // boot: load from persistent storage, seed if empty
  useEffect(() => {
    (async () => {
      const saved = await Store.get(STORAGE_KEY, null);
      if (saved && saved.studios && saved.studios.length) {
        setStudios(saved.studios);
      } else {
        const init = makeInitialDB();
        setStudios(init.studios);
        await Store.set(STORAGE_KEY, init);
      }
      // simple hash-based routing for public booking links: #/book/slug
      const hash = window.location.hash;
      if (hash.startsWith("#/book/")) {
        setPublicSlug(hash.replace("#/book/", ""));
        setView("public");
      }
      setBooted(true);
    })();
  }, []);

  // persist whenever studios change (after boot)
  useEffect(() => {
    if (!booted) return;
    Store.set(STORAGE_KEY, { studios });
  }, [studios, booted]);

  useEffect(() => {
    if (toast) {
      const t = setTimeout(() => setToast(null), 3200);
      return () => clearTimeout(t);
    }
  }, [toast]);

  if (!booted) return <LoadingScreen />;

  const goLanding = () => { setView("landing"); setSession(null); };
  const goSignup = (plan) => { setSignupPlan(plan && typeof plan === "string" ? plan : "mensal"); setView("signup"); };
  const goLogin = () => setView("login");
  const goAdminLogin = () => setView("adminLogin");

  const handleSignupComplete = ({ studioName, ownerName, email, password, plan, payMethod }) => {
    const slugBase = slugify(studioName) || "studio";
    let slug = slugBase, n = 1;
    while (studios.some(s => s.slug === slug)) { slug = `${slugBase}-${n++}`; }
    const newStudio = seedStudio(studioName, slug, { name: ownerName, email, password }, plan);
    newStudio.payments = [{
      id: uid("pay"),
      label: `Assinatura Agenda Glow — Plano ${plan === "anual" ? "Anual" : "Mensal"}`,
      amount: plan === "anual" ? PLAN_PRICES.anual : PLAN_PRICES.mensal,
      date: todayISO(), method: payMethod, status: "pago",
    }];
    // give the new studio a clean slate (no demo clients/appointments) except sample services
    newStudio.clients = [];
    newStudio.appointments = [];
    const next = [...studios, newStudio];
    setStudios(next);
    setSession({ type: "studio", studioId: newStudio.id });
    setView("studio");
    setToast({ msg: `Bem-vinda à Agenda Glow! Plano ${plan === "anual" ? "anual" : "mensal"} ativado.`, type: "success", key: uid("t") });
  };

  const handleStudioLogin = (email, password) => {
    const studio = studios.find(s => s.owner.email.toLowerCase() === email.toLowerCase() && s.owner.password === password);
    if (!studio) return false;
    setSession({ type: "studio", studioId: studio.id });
    setView("studio");
    return true;
  };

  const handleAdminLogin = (email, password) => {
    if (email.toLowerCase() === ADMIN_CRED.email && password === ADMIN_CRED.password) {
      setSession({ type: "admin" });
      setView("admin");
      return true;
    }
    return false;
  };

  const logout = () => { setSession(null); setView("landing"); };

  const currentStudio = session?.type === "studio" ? studios.find(s => s.id === session.studioId) : null;
  const updateCurrentStudio = (next) => setStudios(studios.map(s => s.id === next.id ? next : s));

  const publicStudio = publicSlug ? studios.find(s => s.slug === publicSlug) : null;

  const handlePublicBooking = ({ serviceId, date, time, name, phone }) => {
    if (!publicStudio) return;
    let clients = publicStudio.clients;
    let client = clients.find(c => c.phone === phone);
    if (!client) {
      client = { id: uid("cli"), name, phone };
      clients = [...clients, client];
    }
    const appt = { id: uid("apt"), clientId: client.id, serviceId, date, time, status: "confirmado" };
    const next = { ...publicStudio, clients, appointments: [...publicStudio.appointments, appt] };
    setStudios(studios.map(s => s.id === next.id ? next : s));
  };

  const ctx = { toast, setToast };

  let content;
  if (view === "public" && publicStudio) {
    content = <PublicBookingPage studio={publicStudio} onBookingComplete={handlePublicBooking} />;
  } else if (view === "public" && !publicStudio) {
    content = (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <EmptyState icon="alertTriangle" title="Studio não encontrado" body="Este link de agendamento não existe ou foi removido." action={
          <button className="btn btn-primary" onClick={() => { window.location.hash = ""; goLanding(); }}>Voltar para o início</button>
        } />
      </div>
    );
  } else if (view === "signup") {
    content = <SignupScreen initialPlan={signupPlan} onBack={goLanding} onComplete={handleSignupComplete} />;
  } else if (view === "login") {
    content = <LoginScreen onBack={goLanding} onLogin={handleStudioLogin} role="studio" />;
  } else if (view === "adminLogin") {
    content = <LoginScreen onBack={goLanding} onLogin={handleAdminLogin} role="admin" />;
  } else if (view === "studio" && currentStudio) {
    content = <StudioApp studio={currentStudio} setStudio={updateCurrentStudio} onLogout={logout} />;
  } else if (view === "admin" && session?.type === "admin") {
    content = <AdminApp studios={studios} setStudios={setStudios} onLogout={logout} />;
  } else {
    content = <LandingPage onLogin={goLogin} onSignup={goSignup} onAdminLogin={goAdminLogin} />;
  }

  return (
    <AppCtx.Provider value={ctx}>
      {content}
      <Toast toast={toast} />
    </AppCtx.Provider>
  );
}

/* responsive helper styles injected once */

responsiveStyle.innerHTML = `
  @media (max-width: 900px) {
    .nav-desktop a { display: none; }
  }
  @media (max-width: 860px) {
    .sidebar-desktop { transform: translateX(-100%); }
    .main-content { margin-left: 0 !important; padding: 22px 18px !important; }
    .menu-toggle { display: inline-flex !important; }
    .admin-grid { grid-template-columns: 1fr !important; }
  }
`;
document.head.appendChild(responsiveStyle);

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);
</script>
